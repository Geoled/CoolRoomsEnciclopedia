<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Tihie Rooms Enciclopedia</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: #121217;
      background-image: radial-gradient(circle at 50% 0%, #1e1d24 0%, #121217 60%);
      color: #d4d4dc;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 270px;
      background: #1a1a22;
      border-right: 1px solid #2e2e3a;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 1.2rem;
      border-bottom: 1px solid #2e2e3a;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      color: #c9b896;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tree {
      flex:1; overflow-y:auto; padding:0.5rem 0;
    }
    .tree-item {
      padding: 0.5rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #b0b0be;
      font-size: 0.9rem;
      transition: 0.15s;
    }
    .tree-item:hover { background:#2a2a35; color:#e8dcc8; }
    .tree-folder { font-weight:600; color:#b8974c; }
    .tree-children { display: block; }
    .main {
      flex:1; display:flex; flex-direction:column; overflow:hidden;
    }
    .top-bar {
      background:#1a1a22; border-bottom:1px solid #2e2e3a; padding:0.8rem 1.5rem;
      display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
    }
    .tabs { display:flex; gap:0.5rem; margin-right:auto; }
    .tab-btn {
      background:transparent; border:1px solid transparent; color:#8c8c9a;
      padding:0.4rem 0.8rem; border-radius:16px; font-size:0.85rem; cursor:pointer; transition:0.2s;
    }
    .tab-btn.active { background:#2c2c38; border-color:#c9a86c; color:#c9a86c; }
    .breadcrumbs { font-size:0.85rem; color:#8c8c9a; }
    .breadcrumbs span { color:#bca07c; cursor:pointer; }
    .breadcrumbs span:hover { text-decoration:underline; }
    .actions { display:flex; gap:0.5rem; }
    .btn {
      background:#1e1e26; border:1px solid #3d3d4a; color:#cacaca;
      padding:0.5rem 1rem; border-radius:20px; font-size:0.85rem; cursor:pointer;
      transition:0.2s; display:inline-flex; align-items:center; gap:0.3rem;
    }
    .btn:hover { background:#262630; border-color:#c9a86c; color:#e8dcc8; }
    .btn.primary { background:#2c2a1f; border-color:#b8974c; color:#e5c97a; }
    .content-area {
      flex:1; overflow-y:auto; padding:1.5rem;
    }
    .filters-bar {
      display:flex; gap:0.8rem; margin-bottom:1.5rem; flex-wrap:wrap;
    }
    .filters-bar input, .filters-bar select {
      padding:0.6rem 1rem; background:#14141b; border:1px solid #3a3a48;
      border-radius:14px; color:#d0d0d0; font-size:0.9rem; outline:none;
    }
    .filters-bar input:focus, .filters-bar select:focus { border-color:#c9a86c; }
    .grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:1.2rem;
    }
    .card {
      background:#1c1c24; border:1px solid #2d2d3a; border-radius:16px;
      padding:1.2rem; cursor:pointer; transition:0.2s;
    }
    .card:hover { transform:translateY(-2px); border-color:#b8974c; }
    .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
    .card-id { font-weight:600; color:#c9a86c; }
    .class-icon { font-size:1.2rem; }
    .survival-bar { display:flex; gap:0.3rem; margin:0.5rem 0; }
    .survival-segment { height:6px; border-radius:3px; flex:1; }
    .segment-safe { background:#6a9a6a; } .segment-stable { background:#5a7a9a; } .segment-entity { background:#b9774a; }
    .card-desc { font-size:0.85rem; color:#a0a0b0; margin-top:0.3rem; }
    .home-content { max-width:700px; margin:0 auto; line-height:1.6; }
    .modal {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); align-items:center;
      justify-content:center; z-index:100; padding:1rem;
    }
    .modal.active { display:flex; }
    .modal-content {
      background:#1c1c24; border:1px solid #3d3d4a; border-radius:24px;
      padding:2rem; max-width:800px; width:100%; max-height:90vh; overflow-y:auto;
    }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.85rem; color:#b0b0be; margin-bottom:0.3rem; }
    .form-group input, .form-group textarea, .form-group select {
      width:100%; padding:0.7rem; background:#14141b; border:1px solid #3a3a48;
      border-radius:10px; color:#d0d0d0; font-size:0.9rem; outline:none;
    }
    .gallery { display:flex; flex-wrap:wrap; gap:0.5rem; }
    .gallery img { width:80px; height:80px; object-fit:cover; border-radius:8px; cursor:pointer; border:1px solid #3a3a4a; }
    .lightbox {
      position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9);
      display:none; align-items:center; justify-content:center; z-index:200;
    }
    .lightbox img { max-width:90%; max-height:90%; border-radius:12px; }
    @media (max-width:700px) {
      body { flex-direction:column; }
      .sidebar { width:100%; height:40%; }
    }
  </style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><span>◈</span> Tihie Rooms</div>
  <div class="tree" id="tree"></div>
</div>
<div class="main">
  <div class="top-bar" id="topBar">
    <div class="tabs">
      <span class="tab-btn active" data-tab="home">🏠 Главная</span>
      <span class="tab-btn" data-tab="levels">📊 Уровни</span>
      <span class="tab-btn" data-tab="entities">👾 Сущности</span>
      <span class="tab-btn" data-tab="items">📦 Предметы</span>
      <span class="tab-btn" data-tab="food">🍎 Еда</span>
    </div>
    <div class="breadcrumbs" id="breadcrumbs">Главная</div>
    <div class="actions">
      <button class="btn" id="refreshBtn">🔄 Обновить</button>
      <button class="btn" id="settingsBtn">⚙️ Классы</button>
      <button class="btn primary" id="addBtn">➕ Создать</button>
    </div>
  </div>
  <div class="content-area" id="contentArea"></div>
</div>

<!-- Модальные окна -->
<div class="modal" id="viewModal"><div class="modal-content" id="viewContent"></div></div>
<div class="modal" id="editModal"><div class="modal-content" id="editContent"></div></div>
<div class="modal" id="classSettingsModal"><div class="modal-content" id="classSettingsContent"></div></div>
<div class="lightbox" id="lightbox" onclick="this.style.display='none'"><img id="lightboxImg" src=""></div>

<script>
(function() {
  let currentSection = 'home'; // home, levels, entities, items, food
  let levels = [], entities = [], items = [], foodItems = [];
  let classStyles = JSON.parse(localStorage.getItem('classStyles')) || {
    "0": { icon:"🟢", color:"#6a9a6a", name:"Безопасный" },
    "1": { icon:"🟡", color:"#c9a64a", name:"Почти безопасный" },
    "2": { icon:"🟠", color:"#b9774a", name:"Небезопасный" },
    "3": { icon:"🟤", color:"#8b5a2b", name:"Опасный" },
    "4": { icon:"🔴", color:"#a95a5a", name:"Очень опасный" },
    "5": { icon:"⛔", color:"#8b0000", name:"Смертельный" }
  };

  const tree = document.getElementById('tree');
  const breadcrumbs = document.getElementById('breadcrumbs');
  const contentArea = document.getElementById('contentArea');
  const searchInput = document.getElementById('searchInput');
  const sortSelect = document.getElementById('sortSelect');
  const viewModal = document.getElementById('viewModal');
  const viewContent = document.getElementById('viewContent');
  const editModal = document.getElementById('editModal');
  const editContent = document.getElementById('editContent');
  const classSettingsModal = document.getElementById('classSettingsModal');
  const classSettingsContent = document.getElementById('classSettingsContent');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const addBtn = document.getElementById('addBtn');

  async function fetchJSON(file) {
    const owner = localStorage.getItem('gh_owner');
    const repo = localStorage.getItem('gh_repo');
    if (!owner || !repo) return [];
    try {
      const url = `https://raw.githubusercontent.com/${owner}/${repo}/main/${file}?t=${Date.now()}`;
      const resp = await fetch(url, { cache:'no-store' });
      if (!resp.ok) throw new Error('not found');
      return await resp.json();
    } catch(e) { return []; }
  }

  async function loadAllData() {
    levels = await fetchJSON('levels.json') || [];
    if (!levels.length) levels.push({ id:"0", title:"Тихая Прихожая", cluster:"Основные", cls:"0", desc:"Уютная анфилада комнат...", food:"Хлеб, сыр...", ent:["Кот-Проводник"], in:"...", out:"...", survival:{safety:5, stability:4, entities:1}, images:[] });
    entities = await fetchJSON('entities.json') || [];
    items = await fetchJSON('items.json') || [];
    foodItems = await fetchJSON('food.json') || [];
  }

  function getCurrentData() {
    if (currentSection === 'levels') return levels;
    if (currentSection === 'entities') return entities;
    if (currentSection === 'items') return items;
    if (currentSection === 'food') return foodItems;
    return [];
  }

  function getClassNumber(cls) {
    const m = cls?.toString().match(/^(\d+)/);
    return m ? parseInt(m[1]) : 999;
  }

  function sortData(data, key) {
    const a = [...data];
    switch(key) {
      case 'id_asc': return a.sort((x,y) => (x.id||'').localeCompare(y.id||'', undefined, {numeric:true}));
      case 'id_desc': return a.sort((x,y) => (y.id||'').localeCompare(x.id||'', undefined, {numeric:true}));
      case 'name_asc': return a.sort((x,y) => (x.title||x.name||'').localeCompare(y.title||y.name||''));
      case 'name_desc': return a.sort((x,y) => (y.title||y.name||'').localeCompare(x.title||x.name||''));
      case 'class_asc': return a.sort((x,y) => getClassNumber(x.cls) - getClassNumber(y.cls));
      case 'class_desc': return a.sort((x,y) => getClassNumber(y.cls) - getClassNumber(x.cls));
      default: return a;
    }
  }

  function renderContent() {
    if (currentSection === 'home') {
      contentArea.innerHTML = `<div class="home-content">
        <h2 style="color:#c9b896;">Добро пожаловать в Tihie Rooms Enciclopedia</h2>
        <p style="margin-top:1rem;">Это сообщество исследователей Закулисья. Здесь вы найдёте описания уровней, существ, предметов и пищи, с которыми сталкиваются странники в бесконечных комнатах.</p>
        <p>Используйте вкладки выше для навигации по разделам, а боковую панель — для быстрого перехода к конкретным записям.</p>
        <p style="margin-top:1rem;"><strong>Последние добавленные уровни:</strong></p>
        <ul>${levels.slice(-3).map(l => `<li>Уровень ${l.id} – ${l.title}</li>`).join('')}</ul>
      </div>`;
      tree.innerHTML = '<div style="padding:1rem; color:#8c8c9a;">Выберите раздел</div>';
      return;
    }

    let data = getCurrentData();
    const search = searchInput?.value?.toLowerCase() || '';
    data = data.filter(d => (d.title||d.name||'').toLowerCase().includes(search) || (d.id||'').includes(search));
    const sort = sortSelect?.value || 'default';
    data = sortData(data, sort);

    contentArea.innerHTML = `
      <div class="filters-bar">
        <input type="text" id="searchInputField" placeholder="Поиск..." value="${search}">
        <select id="sortSelectField">
          <option value="default" ${sort==='default'?'selected':''}>По умолчанию</option>
          <option value="id_asc" ${sort==='id_asc'?'selected':''}>ID возр.</option>
          <option value="id_desc" ${sort==='id_desc'?'selected':''}>ID убыв.</option>
          <option value="name_asc" ${sort==='name_asc'?'selected':''}>Название А-Я</option>
          <option value="name_desc" ${sort==='name_desc'?'selected':''}>Название Я-А</option>
          <option value="class_asc" ${sort==='class_asc'?'selected':''}>Класс (0→5)</option>
          <option value="class_desc" ${sort==='class_desc'?'selected':''}>Класс (5→0)</option>
        </select>
      </div>
      <div class="grid" id="grid"></div>`;
    const grid = document.getElementById('grid');
    grid.innerHTML = data.map(d => {
      if (currentSection === 'levels') return renderLevelCard(d);
      if (currentSection === 'entities') return renderEntityCard(d);
      if (currentSection === 'items') return renderItemCard(d);
      if (currentSection === 'food') return renderFoodCard(d);
    }).join('');
    attachCardListeners();

    document.getElementById('searchInputField').addEventListener('input', (e) => {
      searchInput.value = e.target.value;
      renderContent();
    });
    document.getElementById('sortSelectField').addEventListener('change', (e) => {
      sortSelect.value = e.target.value;
      renderContent();
    });
  }

  function renderLevelCard(l) {
    const survival = l.survival || {safety:3, stability:3, entities:3};
    return `<div class="card" data-type="level" data-id="${l.id}">
      <div class="card-header"><span class="card-id">${l.id}</span><span class="class-icon">${getClassIcon(l.cls)}</span></div>
      <div style="font-weight:500;">${l.title}</div>
      <div class="survival-bar">
        <div class="survival-segment segment-safe" style="flex:${survival.safety}"></div>
        <div class="survival-segment segment-stable" style="flex:${survival.stability}"></div>
        <div class="survival-segment segment-entity" style="flex:${survival.entities}"></div>
      </div>
      <div class="card-desc">${l.desc?.substring(0,80)||''}...</div>
    </div>`;
  }
  function renderEntityCard(e) {
    return `<div class="card" data-type="entity" data-id="${e.id}">
      <div class="card-header"><span class="card-id">Entity ${e.id}</span></div>
      <div style="font-weight:500;">${e.name}</div>
      <div>Класс: ${e.cls||'?'}</div>
    </div>`;
  }
  function renderItemCard(i) {
    return `<div class="card" data-type="item" data-id="${i.id}">
      <div class="card-header"><span class="card-id">Item ${i.id}</span></div>
      <div style="font-weight:500;">${i.name}</div>
      <div>${i.desc?.substring(0,60)||''}</div>
    </div>`;
  }
  function renderFoodCard(f) {
    return `<div class="card" data-type="food" data-id="${f.id}">
      <div class="card-header"><span class="card-id">Food ${f.id}</span></div>
      <div style="font-weight:500;">${f.name}</div>
      <div>${f.desc?.substring(0,60)||''}</div>
    </div>`;
  }

  function attachCardListeners() {
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const type = card.dataset.type;
        const id = card.dataset.id;
        openView(type, id);
      });
    });
  }

  function getClassIcon(cls) {
    const num = cls ? cls.toString().match(/^(\d+)/)?.[1] : '?';
    return classStyles[num]?.icon || '⬜';
  }

  function openView(type, id) {
    let obj;
    if (type === 'level') obj = levels.find(l => l.id === id);
    else if (type === 'entity') obj = entities.find(e => e.id === id);
    else if (type === 'item') obj = items.find(i => i.id === id);
    else if (type === 'food') obj = foodItems.find(f => f.id === id);
    if (!obj) return;
    updateBreadcrumbs(`${type==='level'?'Уровень':type==='entity'?'Сущность':type==='item'?'Предмет':'Еда'} ${obj.id}`);
    viewContent.innerHTML = generateViewHTML(type, obj);
    viewModal.classList.add('active');
    viewContent.querySelectorAll('.gallery img').forEach(img => {
      img.addEventListener('click', (e) => {
        lightboxImg.src = e.target.src;
        lightbox.style.display = 'flex';
      });
    });
    viewContent.querySelectorAll('.entity-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.stopPropagation();
        const name = link.dataset.entity;
        const ent = entities.find(e => e.name === name);
        if (ent) openView('entity', ent.id);
      });
    });
  }

  function generateViewHTML(type, obj) {
    if (type === 'level') {
      const survival = obj.survival || {safety:3, stability:3, entities:3};
      const imgs = (obj.images||[]).map(img => `<img src="${img.url}" alt="${img.description||''}">`).join('');
      return `<h2>Уровень ${obj.id} — «${obj.title}»</h2>
        <p><strong>Класс:</strong> ${obj.cls} ${getClassIcon(obj.cls)}</p>
        <div class="survival-bar">
          <div class="survival-segment segment-safe" style="flex:${survival.safety}"></div>
          <div class="survival-segment segment-stable" style="flex:${survival.stability}"></div>
          <div class="survival-segment segment-entity" style="flex:${survival.entities}"></div>
        </div>
        <p>${obj.desc}</p>
        <p><strong>Пища:</strong> ${obj.food}</p>
        <p><strong>Сущности:</strong> ${(obj.ent||[]).map(e => `<span class="entity-link" data-entity="${e}">${e}</span>`).join(', ') || '—'}</p>
        <p><strong>Входы:</strong> ${obj.in}</p>
        <p><strong>Выходы:</strong> ${obj.out}</p>
        <div class="gallery">${imgs}</div>`;
    } else if (type === 'entity') {
      return `<h2>Сущность ${obj.id} — «${obj.name}»</h2>
        <p><strong>Класс:</strong> ${obj.cls}</p>
        <p><strong>Среда:</strong> ${obj.habitat}</p>
        <p>${obj.desc}</p>
        ${obj.behavior ? `<p><strong>Поведение:</strong> ${obj.behavior}</p>` : ''}
        ${obj.survival ? `<p><strong>Выживание:</strong> ${obj.survival}</p>` : ''}`;
    } else if (type === 'item') {
      return `<h2>Предмет ${obj.id} — «${obj.name}»</h2>
        <p>${obj.desc}</p>
        ${obj.props ? `<p><strong>Свойства:</strong> ${obj.props}</p>` : ''}`;
    } else if (type === 'food') {
      return `<h2>Еда ${obj.id} — «${obj.name}»</h2>
        <p>${obj.desc}</p>
        ${obj.effect ? `<p><strong>Эффект:</strong> ${obj.effect}</p>` : ''}`;
    }
  }

  function updateBreadcrumbs(text) {
    breadcrumbs.innerHTML = `<span onclick="switchSection('home')">Главная</span> > ${text}`;
  }

  // Открытие формы создания/редактирования
  function openCreateForm() {
    if (currentSection === 'levels') openEditLevelModal();
    else if (currentSection === 'entities') openEditEntityModal();
    else if (currentSection === 'items') openEditItemModal();
    else if (currentSection === 'food') openEditFoodModal();
  }

  function openEditLevelModal(level=null) {
    const lvl = level || { id:'', title:'', cluster:'', cls:'0', desc:'', food:'', ent:[], in:'', out:'', survival:{safety:3,stability:3,entities:3}, images:[] };
    const classOptions = [0,1,2,3,4,5].map(i => `<option value="${i}" ${lvl.cls == i ? 'selected' : ''}>${i} - ${classStyles[i]?.name || 'Класс '+i}</option>`).join('');
    editContent.innerHTML = `
      <h3>${level?'Редактировать':'Новый'} уровень</h3>
      <div class="form-group"><label>ID</label><input id="editId" value="${lvl.id}"></div>
      <div class="form-group"><label>Название</label><input id="editTitle" value="${lvl.title}"></div>
      <div class="form-group"><label>Кластер</label><input id="editCluster" value="${lvl.cluster||''}"></div>
      <div class="form-group"><label>Класс</label><select id="editClass">${classOptions}</select></div>
      <div class="form-group"><label>Безопасность (1-5)</label><input type="number" id="editSafety" value="${lvl.survival?.safety||3}" min="1" max="5"></div>
      <div class="form-group"><label>Стабильность (1-5)</label><input type="number" id="editStability" value="${lvl.survival?.stability||3}" min="1" max="5"></div>
      <div class="form-group"><label>Заселённость (1-5)</label><input type="number" id="editEntities" value="${lvl.survival?.entities||3}" min="1" max="5"></div>
      <div class="form-group"><label>Описание</label><textarea id="editDesc">${lvl.desc}</textarea></div>
      <div class="form-group"><label>Пища</label><input id="editFood" value="${lvl.food}"></div>
      <div class="form-group"><label>Сущности (через запятую)</label><input id="editEnt" value="${(lvl.ent||[]).join(', ')}"></div>
      <div class="form-group"><label>Входы</label><input id="editIn" value="${lvl.in}"></div>
      <div class="form-group"><label>Выходы</label><input id="editOut" value="${lvl.out}"></div>
      <button class="btn primary" id="saveLevelBtn">Сохранить</button>
      <button class="btn" onclick="editModal.classList.remove('active')">Отмена</button>`;
    editModal.classList.add('active');
    document.getElementById('saveLevelBtn').addEventListener('click', async () => {
      const newLevel = {
        id: document.getElementById('editId').value,
        title: document.getElementById('editTitle').value,
        cluster: document.getElementById('editCluster').value,
        cls: document.getElementById('editClass').value,
        survival: {
          safety: +document.getElementById('editSafety').value,
          stability: +document.getElementById('editStability').value,
          entities: +document.getElementById('editEntities').value
        },
        desc: document.getElementById('editDesc').value,
        food: document.getElementById('editFood').value,
        ent: document.getElementById('editEnt').value.split(',').map(s=>s.trim()).filter(Boolean),
        in: document.getElementById('editIn').value,
        out: document.getElementById('editOut').value,
        images: lvl.images || []
      };
      if (level) { const idx = levels.findIndex(l => l.id === level.id); if (idx !== -1) levels[idx] = newLevel; }
      else levels.push(newLevel);
      await commitJSON('levels.json', levels);
      editModal.classList.remove('active');
      renderContent();
      renderTree();
    });
  }

  function openEditEntityModal(entity=null) {
    const e = entity || { id:'', name:'', cls:'', habitat:'', desc:'', behavior:'', survival:'' };
    editContent.innerHTML = `
      <h3>${entity?'Редактировать':'Новая'} сущность</h3>
      <div class="form-group"><label>ID</label><input id="editId" value="${e.id}"></div>
      <div class="form-group"><label>Название</label><input id="editName" value="${e.name}"></div>
      <div class="form-group"><label>Класс</label><input id="editClass" value="${e.cls||''}"></div>
      <div class="form-group"><label>Среда обитания</label><input id="editHabitat" value="${e.habitat||''}"></div>
      <div class="form-group"><label>Описание</label><textarea id="editDesc">${e.desc||''}</textarea></div>
      <div class="form-group"><label>Поведение</label><textarea id="editBehavior">${e.behavior||''}</textarea></div>
      <div class="form-group"><label>Выживание</label><textarea id="editSurvival">${e.survival||''}</textarea></div>
      <button class="btn primary" id="saveEntityBtn">Сохранить</button>
      <button class="btn" onclick="editModal.classList.remove('active')">Отмена</button>`;
    editModal.classList.add('active');
    document.getElementById('saveEntityBtn').addEventListener('click', async () => {
      const newEntity = {
        id: document.getElementById('editId').value,
        name: document.getElementById('editName').value,
        cls: document.getElementById('editClass').value,
        habitat: document.getElementById('editHabitat').value,
        desc: document.getElementById('editDesc').value,
        behavior: document.getElementById('editBehavior').value,
        survival: document.getElementById('editSurvival').value
      };
      if (entity) { const idx = entities.findIndex(en => en.id === entity.id); if (idx !== -1) entities[idx] = newEntity; }
      else entities.push(newEntity);
      await commitJSON('entities.json', entities);
      editModal.classList.remove('active');
      renderContent();
      renderTree();
    });
  }

  function openEditItemModal(item=null) {
    const i = item || { id:'', name:'', desc:'', props:'' };
    editContent.innerHTML = `
      <h3>${item?'Редактировать':'Новый'} предмет</h3>
      <div class="form-group"><label>ID</label><input id="editId" value="${i.id}"></div>
      <div class="form-group"><label>Название</label><input id="editName" value="${i.name}"></div>
      <div class="form-group"><label>Описание</label><textarea id="editDesc">${i.desc||''}</textarea></div>
      <div class="form-group"><label>Свойства</label><textarea id="editProps">${i.props||''}</textarea></div>
      <button class="btn primary" id="saveItemBtn">Сохранить</button>
      <button class="btn" onclick="editModal.classList.remove('active')">Отмена</button>`;
    editModal.classList.add('active');
    document.getElementById('saveItemBtn').addEventListener('click', async () => {
      const newItem = {
        id: document.getElementById('editId').value,
        name: document.getElementById('editName').value,
        desc: document.getElementById('editDesc').value,
        props: document.getElementById('editProps').value
      };
      if (item) { const idx = items.findIndex(it => it.id === item.id); if (idx !== -1) items[idx] = newItem; }
      else items.push(newItem);
      await commitJSON('items.json', items);
      editModal.classList.remove('active');
      renderContent();
      renderTree();
    });
  }

  function openEditFoodModal(food=null) {
    const f = food || { id:'', name:'', desc:'', effect:'' };
    editContent.innerHTML = `
      <h3>${food?'Редактировать':'Новая'} еда</h3>
      <div class="form-group"><label>ID</label><input id="editId" value="${f.id}"></div>
      <div class="form-group"><label>Название</label><input id="editName" value="${f.name}"></div>
      <div class="form-group"><label>Описание</label><textarea id="editDesc">${f.desc||''}</textarea></div>
      <div class="form-group"><label>Эффект</label><textarea id="editEffect">${f.effect||''}</textarea></div>
      <button class="btn primary" id="saveFoodBtn">Сохранить</button>
      <button class="btn" onclick="editModal.classList.remove('active')">Отмена</button>`;
    editModal.classList.add('active');
    document.getElementById('saveFoodBtn').addEventListener('click', async () => {
      const newFood = {
        id: document.getElementById('editId').value,
        name: document.getElementById('editName').value,
        desc: document.getElementById('editDesc').value,
        effect: document.getElementById('editEffect').value
      };
      if (food) { const idx = foodItems.findIndex(fd => fd.id === food.id); if (idx !== -1) foodItems[idx] = newFood; }
      else foodItems.push(newFood);
      await commitJSON('food.json', foodItems);
      editModal.classList.remove('active');
      renderContent();
      renderTree();
    });
  }

  async function commitJSON(filename, data) {
    const owner = localStorage.getItem('gh_owner');
    const repo = localStorage.getItem('gh_repo');
    const token = localStorage.getItem('gh_token');
    if (!owner || !repo || !token) return alert('Настройте GitHub.');
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${filename}`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    let sha = null;
    try { const resp = await fetch(url, { headers: { Authorization: `token ${token}` }, cache:'no-store' }); if (resp.ok) sha = (await resp.json()).sha; } catch(e) {}
    await fetch(url, { method:'PUT', headers: { Authorization: `token ${token}`, 'Content-Type':'application/json' }, body: JSON.stringify({ message:`Update ${filename}`, content, branch:'main', ...(sha?{sha}:{}) }) });
  }

  function renderTree() {
    if (currentSection === 'home') { tree.innerHTML = '<div style="padding:1rem; color:#8c8c9a;">Выберите раздел</div>'; return; }
    const data = getCurrentData();
    if (currentSection === 'levels') {
      const clusters = {};
      data.forEach(l => { const c = l.cluster || 'Без кластера'; if (!clusters[c]) clusters[c] = []; clusters[c].push(l); });
      tree.innerHTML = '';
      Object.entries(clusters).forEach(([name, items]) => {
        const folder = document.createElement('div'); folder.className = 'tree-item tree-folder'; folder.textContent = '📁 ' + name;
        const childContainer = document.createElement('div'); childContainer.className = 'tree-children'; childContainer.style.display = 'block';
        folder.addEventListener('click', (e) => { e.stopPropagation(); childContainer.style.display = childContainer.style.display === 'none' ? 'block' : 'none'; });
        tree.appendChild(folder);
        tree.appendChild(childContainer);
        items.forEach(l => {
          const item = document.createElement('div'); item.className = 'tree-item'; item.style.paddingLeft = '2rem';
          item.innerHTML = `<span class="class-icon">${getClassIcon(l.cls)}</span> ${l.title}`;
          item.addEventListener('click', (e) => { e.stopPropagation(); openView('level', l.id); });
          childContainer.appendChild(item);
        });
      });
    } else {
      tree.innerHTML = '';
      data.forEach(d => {
        const item = document.createElement('div'); item.className = 'tree-item';
        item.textContent = (d.name || d.title || d.id);
        item.addEventListener('click', () => openView(currentSection.slice(0, -1), d.id)); // 'entities' -> 'entity', 'items'->'item','food'->'food'
        tree.appendChild(item);
      });
    }
  }

  function switchSection(section) {
    currentSection = section;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === section));
    if (section === 'home') breadcrumbs.innerHTML = 'Главная';
    else breadcrumbs.innerHTML = `<span onclick="switchSection('home')">Главная</span> > ${section==='levels'?'Уровни':section==='entities'?'Сущности':section==='items'?'Предметы':'Еда'}`;
    renderTree();
    renderContent();
  }

  // Привязки событий
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchSection(b.dataset.tab)));
  document.getElementById('settingsBtn').addEventListener('click', () => {
    let html = '<h3>Настройка иконок классов</h3>';
    for (let i=0; i<=5; i++) {
      const style = classStyles[i] || { icon:'⬜', color:'#777', name:`Класс ${i}` };
      html += `<div class="form-group"><label>Класс ${i}</label>
        <input id="icon${i}" value="${style.icon}" placeholder="Иконка"> 
        <input id="color${i}" value="${style.color}" placeholder="Цвет"> 
        <input id="name${i}" value="${style.name}" placeholder="Название"></div>`;
    }
    html += '<button class="btn primary" id="saveClassBtn">Сохранить</button>';
    classSettingsContent.innerHTML = html;
    classSettingsModal.classList.add('active');
    document.getElementById('saveClassBtn').onclick = () => {
      for (let i=0; i<=5; i++) {
        classStyles[i] = { icon: document.getElementById(`icon${i}`).value, color: document.getElementById(`color${i}`).value, name: document.getElementById(`name${i}`).value };
      }
      localStorage.setItem('classStyles', JSON.stringify(classStyles));
      classSettingsModal.classList.remove('active');
      renderContent();
      renderTree();
    };
  });
  addBtn.addEventListener('click', openCreateForm);
  document.getElementById('refreshBtn').addEventListener('click', async () => { await loadAllData(); renderTree(); renderContent(); });
  viewModal.addEventListener('click', e => { if (e.target === viewModal) viewModal.classList.remove('active'); });
  editModal.addEventListener('click', e => { if (e.target === editModal) editModal.classList.remove('active'); });
  classSettingsModal.addEventListener('click', e => { if (e.target === classSettingsModal) classSettingsModal.classList.remove('active'); });

  // Инициализация
  (async () => {
    await loadAllData();
    switchSection('home');
  })();
})();
</script>
