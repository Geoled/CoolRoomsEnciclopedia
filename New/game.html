<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Закулисье: Выживание</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0f1115;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .game-layout {
      display: flex;
      flex: 1;
    }
    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-bar {
      background: #15171e;
      border-bottom: 1px solid #2a2d35;
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .level-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .level-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #3a3d45;
    }
    .level-name {
      font-weight: 600;
      color: #c9a86c;
      font-size: 1.2rem;
    }
    .level-class {
      font-size: 0.85rem;
      color: #8c8c9a;
    }
    .timers {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: #8c8c9a;
    }
    .timer-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .timer-value {
      font-weight: 600;
      color: #c9a86c;
    }
    .stats-panel {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #8c8c9a;
    }
    .stat-value {
      font-weight: 600;
      font-size: 1rem;
      color: #c9a86c;
    }
    .stat-bar {
      width: 70px;
      height: 6px;
      background: #252835;
      border-radius: 3px;
      overflow: hidden;
    }
    .stat-fill {
      height: 100%;
      border-radius: 3px;
    }
    .game-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 1rem;
      gap: 1rem;
    }
    .log-panel {
      flex: 2;
      background: #1a1c24;
      border: 1px solid #2a2d35;
      border-radius: 16px;
      padding: 1rem;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .log-entry {
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2d35;
    }
    .log-entry img {
      vertical-align: middle;
      margin-right: 0.3rem;
      border-radius: 4px;
      width: 30px;
      height: 30px;
      object-fit: cover;
    }
    .inventory-panel {
      flex: 1;
      background: #1a1c24;
      border: 1px solid #2a2d35;
      border-radius: 16px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
    }
    .inv-title {
      font-weight: 600;
      color: #c9a86c;
      margin-bottom: 0.5rem;
    }
    .inv-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem;
      background: #232530;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .inv-item:hover {
      background: #2a2d35;
    }
    .inv-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 6px;
    }
    .inv-item-name {
      font-size: 0.85rem;
      color: #e0e0e0;
    }
    .actions-bar {
      background: #15171e;
      border-top: 1px solid #2a2d35;
      padding: 0.7rem 1.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .btn {
      background: #1e2028;
      border: 1px solid #3a3d45;
      color: #cacaca;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn:hover {
      background: #2a2d35;
      border-color: #c9a86c;
      color: #e8dcc8;
    }
    .btn.primary {
      background: #2c2a1f;
      border-color: #b8974c;
      color: #e5c97a;
    }
    .btn.danger {
      background: #3a2020;
      border-color: #a95a5a;
      color: #e5a0a0;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1c24;
      border: 1px solid #3a3d45;
      border-radius: 20px;
      padding: 1.5rem;
      max-width: 500px;
      width: 100%;
    }
    .modal-content h3 { color: #c9a86c; margin-bottom: 1rem; }
    .modal-content p { margin-bottom: 1rem; }
    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }
    .night-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,40,0.4);
      pointer-events: none;
      z-index: 50;
      display: none;
    }
    .nickname-modal {
      display: flex;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      align-items: center; justify-content: center;
      z-index: 200;
    }
    .nickname-box {
      background: #1a1c24;
      border: 1px solid #3a3d45;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
    }
    .nickname-box input {
      padding: 0.7rem;
      background: #12141a;
      border: 1px solid #3a3d45;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 1rem;
      margin: 1rem 0;
      width: 200px;
      text-align: center;
    }
    @media (max-width: 800px) {
      .game-content { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="nickname-modal" id="nicknameModal">
  <div class="nickname-box">
    <h3 style="color:#c9a86c;">Введите ваш ник</h3>
    <input type="text" id="nicknameInput" placeholder="Никнейм">
    <br>
    <button class="btn primary" id="startGameBtn">Начать игру</button>
  </div>
</div>
<div class="night-overlay" id="nightOverlay"></div>
<div class="game-layout" id="gameLayout" style="display:none;">
  <div class="game-main">
    <div class="top-bar">
      <div class="level-info">
        <img class="level-img" id="levelThumb" src="" onerror="this.style.display='none'" style="display:none;">
        <div>
          <div class="level-name" id="levelName">Загрузка...</div>
          <div class="level-class" id="levelClass"></div>
        </div>
      </div>
      <div class="timers">
        <div class="timer-item">
          <span>Время игры</span>
          <span class="timer-value" id="playTime">00:00</span>
        </div>
        <div class="timer-item">
          <span>Время суток</span>
          <span class="timer-value" id="dayTime">День</span>
        </div>
      </div>
      <div class="stats-panel" id="statsPanel"></div>
    </div>
    <div class="game-content">
      <div class="log-panel" id="logPanel"></div>
      <div class="inventory-panel" id="inventoryPanel">
        <div class="inv-title">🎒 Инвентарь</div>
        <div id="invList"></div>
      </div>
    </div>
    <div class="actions-bar">
      <button class="btn" id="btnExplore">🔍 Исследовать</button>
      <button class="btn" id="btnRest">💤 Отдых</button>
      <button class="btn" id="btnSearchExit">🚪 Искать выход</button>
      <button class="btn primary" id="btnNewGame">🔄 Новая игра</button>
      <button class="btn danger" id="btnResetSave">🗑️ Сбросить прогресс</button>
    </div>
  </div>
</div>

<div class="modal" id="battleModal">
  <div class="modal-content">
    <h3 id="battleTitle">Бой</h3>
    <p id="battleDesc"></p>
    <div class="modal-actions">
      <button class="btn" id="battleAttackBtn">⚔️ Атаковать</button>
      <button class="btn" id="battleFleeBtn">🏃 Бежать</button>
    </div>
  </div>
</div>

<div class="modal" id="itemModal">
  <div class="modal-content">
    <h3 id="itemModalTitle"></h3>
    <p id="itemModalDesc"></p>
    <div class="modal-actions">
      <button class="btn" id="itemUseBtn">Использовать</button>
      <button class="btn" id="itemDropBtn">Выбросить</button>
      <button class="btn" id="itemCloseBtn">Закрыть</button>
    </div>
  </div>
</div>

<script>
(function() {
  const API = {
    owner: () => localStorage.getItem('gh_owner'),
    repo: () => localStorage.getItem('gh_repo'),
    token: () => localStorage.getItem('gh_token'),
    headers: () => { const t = API.token(); return t ? { Authorization: `token ${t}` } : {}; },
    base: () => `https://api.github.com/repos/${API.owner()}/${API.repo()}/contents`,
    raw: (file) => `https://raw.githubusercontent.com/${API.owner()}/${API.repo()}/main/${file}?t=${Date.now()}`
  };

  let data = { levels: [], entities: [], items: [], foods: [] };
  let gameState = {
    hp: 100,
    hunger: 100,
    thirst: 100,
    sleep: 100,
    temperature: 36.6,
    sanity: 100,
    currentLevelId: null,
    inventory: [],
    playTime: 0,
    dayTime: 0 // 0-600 день, 600-1200 ночь (в секундах)
  };
  let playerNickname = '';
  let gameInterval = null;

  const logPanel = document.getElementById('logPanel');
  const inventoryList = document.getElementById('invList');
  const levelNameEl = document.getElementById('levelName');
  const levelClassEl = document.getElementById('levelClass');
  const levelThumb = document.getElementById('levelThumb');
  const statsPanel = document.getElementById('statsPanel');
  const nightOverlay = document.getElementById('nightOverlay');
  const battleModal = document.getElementById('battleModal');
  const itemModal = document.getElementById('itemModal');

  function addLog(msg, imgUrl = null) {
    const div = document.createElement('div');
    div.className = 'log-entry';
    if (imgUrl) {
      div.innerHTML = `<img src="${imgUrl}" onerror="this.style.display='none'"> ${msg}`;
    } else {
      div.textContent = msg;
    }
    logPanel.appendChild(div);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  function updateStats() {
    const stats = [
      { label: 'HP', value: gameState.hp, max: 100, color: '#a95a5a' },
      { label: 'Голод', value: gameState.hunger, max: 100, color: '#c9a64a' },
      { label: 'Жажда', value: gameState.thirst, max: 100, color: '#5a7a9a' },
      { label: 'Сон', value: gameState.sleep, max: 100, color: '#6a9a6a' },
      { label: 'Темп.', value: gameState.temperature, max: 42, color: '#b9774a', unit: '°C' },
      { label: 'Рассудок', value: gameState.sanity, max: 100, color: '#9a6a9a' }
    ];
    statsPanel.innerHTML = stats.map(s => {
      const pct = Math.min(100, (s.value / s.max) * 100);
      return `<div class="stat-item">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value">${s.value}${s.unit||''}</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${pct}%; background:${s.color};"></div></div>
      </div>`;
    }).join('');
  }

  function updateTimers() {
    const mins = Math.floor(gameState.playTime / 60);
    const secs = gameState.playTime % 60;
    document.getElementById('playTime').textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    const isNight = gameState.dayTime >= 600;
    document.getElementById('dayTime').textContent = isNight ? 'Ночь' : 'День';
    nightOverlay.style.display = isNight ? 'block' : 'none';
  }

  function updateInventory() {
    inventoryList.innerHTML = '';
    if (gameState.inventory.length === 0) {
      inventoryList.innerHTML = '<div style="color:#8c8c9a; font-size:0.85rem;">Пусто</div>';
      return;
    }
    gameState.inventory.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'inv-item';
      div.innerHTML = `
        ${item.thumbnail ? `<img src="${item.thumbnail}" onerror="this.style.display='none'">` : '<div style="width:40px;height:40px;background:#252835;border-radius:6px;"></div>'}
        <span class="inv-item-name">${item.name || item.title}</span>`;
      div.addEventListener('click', () => showItemModal(item, index));
      inventoryList.appendChild(div);
    });
  }

  function showItemModal(item, index) {
    document.getElementById('itemModalTitle').textContent = item.name || item.title;
    document.getElementById('itemModalDesc').textContent = item.desc || 'Нет описания';
    itemModal.classList.add('active');
    document.getElementById('itemUseBtn').onclick = () => {
      useItem(item, index);
      itemModal.classList.remove('active');
    };
    document.getElementById('itemDropBtn').onclick = () => {
      gameState.inventory.splice(index, 1);
      addLog(`Вы выбросили ${item.name || item.title}.`);
      updateInventory();
      itemModal.classList.remove('active');
    };
    document.getElementById('itemCloseBtn').onclick = () => itemModal.classList.remove('active');
  }

  function useItem(item, index) {
    const food = data.foods.find(f => f.id === item.id);
    if (food) {
      const calories = food.stats?.calories || 200;
      gameState.hunger = Math.min(100, gameState.hunger + calories / 10);
      if (food.cls === 'drink') gameState.thirst = Math.min(100, gameState.thirst + 40);
      else if (food.cls === 'dish') gameState.thirst = Math.min(100, gameState.thirst + 10);
      else gameState.thirst = Math.min(100, gameState.thirst + 5);
      gameState.inventory.splice(index, 1);
      addLog(`Вы съели/выпили ${food.name}.`);
      updateInventory();
      updateStats();
      return;
    }
    const tool = data.items.find(i => i.id === item.id);
    if (tool) {
      if (tool.cls === 'cold_weapon' || tool.cls === 'firearm') {
        addLog(`Вы экипировали ${tool.name}. Оно поможет в бою.`);
      } else if (tool.cls === 'tool') {
        addLog(`Вы использовали ${tool.name}.`);
        gameState.sanity = Math.min(100, gameState.sanity + 10);
      } else {
        addLog(`Вы использовали ${tool.name}.`);
      }
      gameState.inventory.splice(index, 1);
      updateInventory();
      updateStats();
      return;
    }
    addLog('Нельзя использовать этот предмет.');
  }

  function passiveTick() {
    gameState.playTime++;
    gameState.dayTime = (gameState.dayTime + 1) % 1200;
    gameState.hunger = Math.max(0, gameState.hunger - 0.1);
    gameState.thirst = Math.max(0, gameState.thirst - 0.15);
    gameState.sleep = Math.max(0, gameState.sleep - 0.05);
    if (gameState.hunger <= 0 || gameState.thirst <= 0) {
      gameState.hp = Math.max(0, gameState.hp - 1);
      if (gameState.hp <= 0) addLog('Вы погибли от истощения.');
    }
    if (gameState.sleep <= 0) {
      gameState.hp = Math.max(0, gameState.hp - 0.5);
    }
    if (gameState.hp <= 0) {
      gameState.hp = 0;
      addLog('Вы погибли. Игра окончена.');
      clearInterval(gameInterval);
    }
    updateStats();
    updateTimers();
    autoSave();
  }

  function autoSave() {
    if (!playerNickname) return;
    const filename = `saves/${playerNickname}.json`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(gameState, null, 2))));
    const token = API.token();
    const url = `${API.base()}/${filename}`;
    fetch(url, { headers: { Authorization: `token ${token}` } })
      .then(resp => resp.json())
      .then(data => {
        const sha = data.sha;
        return fetch(url, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Save ${filename}`, content, sha, branch: 'main' })
        });
      }).catch(() => {
        fetch(url, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Save ${filename}`, content, branch: 'main' })
        });
      });
  }

  function loadSave() {
    if (!playerNickname) return;
    const url = `https://raw.githubusercontent.com/${API.owner()}/${API.repo()}/main/saves/${playerNickname}.json`;
    fetch(url).then(resp => resp.json()).then(data => {
      gameState = data;
      const level = data.levels.find(l => l.id === gameState.currentLevelId);
      if (level) updateLevelDisplay(level);
      updateStats();
      updateInventory();
      updateTimers();
      addLog('Прогресс загружен.');
    }).catch(() => {});
  }

  function resetSave() {
    if (!confirm('Удалить всё сохранение?')) return;
    const filename = `saves/${playerNickname}.json`;
    const token = API.token();
    const url = `${API.base()}/${filename}`;
    fetch(url, { headers: { Authorization: `token ${token}` } })
      .then(resp => resp.json())
      .then(data => {
        return fetch(url, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Delete ${filename}`, content: '', sha: data.sha, branch: 'main' })
        });
      }).then(() => {
        alert('Сохранение удалено.');
        location.reload();
      }).catch(() => alert('Ошибка удаления.'));
  }

  function startNewGame() {
    if (data.levels.length === 0) {
      addLog('Нет уровней в базе данных.');
      return;
    }
    const randomLevel = data.levels[Math.floor(Math.random() * data.levels.length)];
    gameState = {
      hp: 100,
      hunger: 100,
      thirst: 100,
      sleep: 100,
      temperature: 36.6,
      sanity: 100,
      currentLevelId: randomLevel.id,
      inventory: [],
      playTime: 0,
      dayTime: 0
    };
    logPanel.innerHTML = '';
    updateLevelDisplay(randomLevel);
    addLog(`Вы очнулись на уровне "${randomLevel.title}".`);
    addLog(`Класс опасности: ${randomLevel.cls}.`);
    updateStats();
    updateInventory();
    updateTimers();
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(passiveTick, 1000);
  }

  function updateLevelDisplay(level) {
    levelNameEl.textContent = level.title || level.name;
    levelClassEl.textContent = `Класс: ${level.cls}`;
    if (level.thumbnail) {
      levelThumb.src = level.thumbnail;
      levelThumb.style.display = 'block';
    } else {
      levelThumb.style.display = 'none';
    }
  }

  function explore() {
    const level = data.levels.find(l => l.id === gameState.currentLevelId);
    if (!level) return;
    const roll = Math.random();
    addLog('Вы осматриваетесь...');

    const resourceChance = (level.stats?.resources || 3) / 10;
    if (roll < resourceChance) {
      const possibleItems = data.items.filter(i => level.itemIds?.includes(i.id));
      if (possibleItems.length > 0) {
        const item = possibleItems[Math.floor(Math.random() * possibleItems.length)];
        gameState.inventory.push(item);
        addLog(`Найдено: ${item.name}.`, item.thumbnail);
        updateInventory();
      }
    } else if (roll < resourceChance * 2) {
      const possibleFoods = data.foods.filter(f => level.foodIds?.includes(f.id));
      if (possibleFoods.length > 0) {
        const food = possibleFoods[Math.floor(Math.random() * possibleFoods.length)];
        gameState.inventory.push(food);
        addLog(`Найдена еда: ${food.name}.`, food.thumbnail);
        updateInventory();
      }
    } else if (roll < 0.7) {
      const possibleEntities = data.entities.filter(e => level.ent?.includes(e.id));
      if (possibleEntities.length > 0) {
        const entity = possibleEntities[Math.floor(Math.random() * possibleEntities.length)];
        addLog(`Вы столкнулись с сущностью: ${entity.name}.`, entity.thumbnail);
        const danger = parseInt(entity.cls) || 0;
        if (danger >= 2) {
          startBattle(entity);
        } else {
          addLog('Сущность не проявляет агрессии.');
        }
      }
    }
    gameState.hunger = Math.max(0, gameState.hunger - 5);
    gameState.thirst = Math.max(0, gameState.thirst - 7);
    gameState.sleep = Math.max(0, gameState.sleep - 4);
    updateStats();
  }

  function startBattle(entity) {
    battleModal.classList.add('active');
    document.getElementById('battleTitle').textContent = `Бой с ${entity.name}`;
    document.getElementById('battleDesc').textContent = `Класс опасности: ${entity.cls}. Ваше HP: ${gameState.hp}`;
    document.getElementById('battleAttackBtn').onclick = () => {
      const weapon = gameState.inventory.find(i => data.items.find(it => it.id === i.id && (it.cls === 'cold_weapon' || it.cls === 'firearm')));
      let damage = 5;
      if (weapon) {
        damage += weapon.cls === 'firearm' ? 15 : 10;
        addLog(`Вы используете ${weapon.name}.`);
      }
      const entityDanger = parseInt(entity.cls) || 0;
      const entityDamage = entityDanger * 5 + Math.floor(Math.random() * 10);
      gameState.hp -= entityDamage;
      addLog(`Сущность наносит вам ${entityDamage} урона.`);
      const hitChance = weapon ? 0.8 : 0.5;
      if (Math.random() < hitChance) {
        addLog(`Вы наносите ${damage} урона.`);
      } else {
        addLog('Вы промахиваетесь!');
      }
      if (gameState.hp <= 0) {
        addLog('Вы погибли в бою.');
        gameState.hp = 0;
        clearInterval(gameInterval);
      }
      battleModal.classList.remove('active');
      updateStats();
    };
    document.getElementById('battleFleeBtn').onclick = () => {
      if (Math.random() < 0.5) {
        addLog('Вы сбежали!');
      } else {
        const entityDanger = parseInt(entity.cls) || 0;
        gameState.hp -= entityDanger * 3;
        addLog('Вам не удалось сбежать, сущность атакует.');
        if (gameState.hp <= 0) {
          addLog('Вы погибли.');
          gameState.hp = 0;
          clearInterval(gameInterval);
        }
      }
      battleModal.classList.remove('active');
      updateStats();
    };
  }

  function rest() {
    addLog('Вы отдыхаете...');
    gameState.sleep = Math.min(100, gameState.sleep + 25);
    gameState.hp = Math.min(100, gameState.hp + 5);
    gameState.hunger = Math.max(0, gameState.hunger - 3);
    gameState.thirst = Math.max(0, gameState.thirst - 3);
    updateStats();
  }

  function searchExit() {
    const level = data.levels.find(l => l.id === gameState.currentLevelId);
    if (!level) return;
    const outIds = level.out ? level.out.split(',').map(s => s.trim()).filter(Boolean) : [];
    if (outIds.length === 0) {
      addLog('На этом уровне нет выходов.');
      return;
    }
    const chance = 0.2 + (level.stats?.navigation || 1) * 0.1;
    if (Math.random() < chance) {
      const nextId = outIds[Math.floor(Math.random() * outIds.length)];
      const nextLevel = data.levels.find(l => l.id === nextId);
      if (nextLevel) {
        gameState.currentLevelId = nextLevel.id;
        updateLevelDisplay(nextLevel);
        addLog(`Вы нашли выход и перешли на уровень "${nextLevel.title}".`);
        gameState.sanity = Math.min(100, gameState.sanity + 10);
      }
    } else {
      addLog('Вы не смогли найти выход.');
    }
    updateStats();
  }

  async function fetchFilesInFolder(folder) {
    if (!API.owner() || !API.repo()) return [];
    const url = `${API.base()}/${folder}`;
    try {
      const resp = await fetch(url, { headers: API.headers(), cache:'no-store' });
      if (!resp.ok) return [];
      const items = await resp.json();
      return Array.isArray(items) ? items.filter(f => f.type === 'file' && f.name.endsWith('.json')) : [];
    } catch(e) { return []; }
  }

  async function loadAllData() {
    try {
      const folders = ['levels', 'entities', 'items', 'foods'];
      data = { levels: [], entities: [], items: [], foods: [] };
      const downloadPromises = [];
      for (const folder of folders) {
        const files = await fetchFilesInFolder(folder);
        files.forEach(file => {
          downloadPromises.push((async () => {
            const resp = await fetch(file.download_url, { cache:'no-store' });
            if (resp.ok) {
              const obj = await resp.json();
              data[folder].push(obj);
            }
          })());
        });
      }
      await Promise.all(downloadPromises);
      return true;
    } catch(e) { return false; }
  }

  document.getElementById('startGameBtn').addEventListener('click', async () => {
    playerNickname = document.getElementById('nicknameInput').value.trim();
    if (!playerNickname) return alert('Введите ник.');
    document.getElementById('nicknameModal').style.display = 'none';
    document.getElementById('gameLayout').style.display = 'flex';
    const loaded = await loadAllData();
    if (!loaded) {
      addLog('Ошибка загрузки данных.');
      return;
    }
    loadSave();
    setTimeout(() => {
      if (!gameState.currentLevelId) startNewGame();
      else {
        const level = data.levels.find(l => l.id === gameState.currentLevelId);
        if (level) updateLevelDisplay(level);
        updateStats();
        updateInventory();
        updateTimers();
        gameInterval = setInterval(passiveTick, 1000);
      }
    }, 500);
  });

  document.getElementById('btnExplore').addEventListener('click', explore);
  document.getElementById('btnRest').addEventListener('click', rest);
  document.getElementById('btnSearchExit').addEventListener('click', searchExit);
  document.getElementById('btnNewGame').addEventListener('click', startNewGame);
  document.getElementById('btnResetSave').addEventListener('click', resetSave);
})();
</script>
</body>
</html>
