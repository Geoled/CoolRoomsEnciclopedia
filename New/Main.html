<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Tihie Rooms · Каталог уровней</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0b0d12;
      color: #d0d0d0;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ───── Header ───── */
    .site-header {
      background: linear-gradient(180deg, #11131a 0%, #0d0f14 100%);
      border-bottom: 1px solid #22252f;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
    }

    .site-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #c9a86c;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .site-nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-link {
      background: transparent;
      border: 1px solid #2a2d37;
      color: #a0a0b0;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #1e212b;
      border-color: #c9a86c;
      color: #e0d0a0;
    }

    .nav-link.primary {
      background: rgba(201, 168, 108, 0.15);
      border-color: #c9a86c;
      color: #e5c97a;
    }

    /* ───── Hero ───── */
    .hero {
      max-width: 1100px;
      margin: 2.5rem auto 2rem;
      padding: 0 1.5rem;
      text-align: center;
    }

    .hero h2 {
      font-size: 2.2rem;
      color: #e0d0a0;
      margin-bottom: 0.5rem;
    }

    .hero p {
      color: #909090;
      font-size: 1rem;
      max-width: 650px;
      margin: 0 auto;
    }

    /* ───── Search & Filter ───── */
    .toolbar {
      max-width: 1100px;
      margin: 0 auto 2rem;
      padding: 0 1.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .toolbar input,
    .toolbar select {
      padding: 0.7rem 1.2rem;
      background: #15171f;
      border: 1px solid #2a2d37;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    .toolbar input:focus,
    .toolbar select:focus {
      border-color: #c9a86c;
    }

    .toolbar input {
      flex: 2;
      min-width: 220px;
    }

    .toolbar select {
      flex: 1;
      min-width: 160px;
    }

    /* ───── Cluster Section ───── */
    .content {
      max-width: 1100px;
      margin: 0 auto 4rem;
      padding: 0 1.5rem;
    }

    .cluster {
      margin-bottom: 2.5rem;
    }

    .cluster-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #b8974c;
      border-bottom: 1px solid #2a2d37;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cluster-count {
      font-size: 0.8rem;
      color: #707070;
      font-weight: 400;
      margin-left: auto;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.8rem;
    }

    .level-card {
      background: #12141b;
      border: 1px solid #1e212b;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .level-card:hover {
      border-color: #c9a86c;
      background: #181a24;
      transform: translateY(-2px);
    }

    .level-icon {
      width: 40px;
      height: 40px;
      background: #1e212b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .level-info {
      flex: 1;
      min-width: 0;
    }

    .level-id {
      font-weight: 600;
      color: #c9a86c;
      font-size: 0.9rem;
    }

    .level-name {
      font-size: 0.85rem;
      color: #b0b0b0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .level-class-badge {
      background: #1e212b;
      padding: 0.2rem 0.6rem;
      border-radius: 10px;
      font-size: 0.7rem;
      color: #909090;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      color: #606060;
      padding: 3rem;
      font-size: 0.95rem;
    }

    /* ───── Modal (quick view) ───── */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #15171f;
      border: 1px solid #2a2d37;
      border-radius: 16px;
      padding: 2rem;
      max-width: 650px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-content h3 {
      color: #c9a86c;
      margin-bottom: 0.5rem;
    }

    .modal-content p {
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    @media (max-width: 700px) {
      .site-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .hero h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-title">◈ Tihie Rooms</div>
    <nav class="site-nav">
      <a class="nav-link active" href="#" data-tab="levels">📊 Уровни</a>
      <a class="nav-link" href="#" data-tab="entities">👾 Сущности</a>
      <a class="nav-link" href="#" data-tab="items">📦 Предметы</a>
      <a class="nav-link" href="#" data-tab="foods">🍎 Еда</a>
      <a class="nav-link primary" href="#" id="addBtn">➕ Новый уровень</a>
    </nav>
  </header>

  <div class="hero">
    <h2>Каталог уровней</h2>
    <p>Исследуйте бесконечные комнаты вселенной «Там, где бог покинет нас вновь». Каждый уровень — уникальное пространство со своими законами, сущностями и опасностями.</p>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Поиск по названию или ID уровня...">
    <select id="clusterFilter">
      <option value="">Все кластеры</option>
    </select>
    <select id="sortSelect">
      <option value="default">По умолчанию</option>
      <option value="id_asc">ID (возр.)</option>
      <option value="id_desc">ID (убыв.)</option>
      <option value="name_asc">Название (А–Я)</option>
      <option value="name_desc">Название (Я–А)</option>
      <option value="class_asc">Класс (0 → 5)</option>
      <option value="class_desc">Класс (5 → 0)</option>
    </select>
  </div>

  <div class="content" id="contentArea">
    <div class="empty-state">Загрузка данных...</div>
  </div>

  <!-- Quick view modal -->
  <div class="modal" id="quickViewModal">
    <div class="modal-content" id="quickViewContent"></div>
  </div>

  <script>
    (function() {
      const API = {
        owner: () => localStorage.getItem('gh_owner'),
        repo: () => localStorage.getItem('gh_repo'),
        token: () => localStorage.getItem('gh_token'),
        headers: () => { const t = API.token(); return t ? { Authorization: `token ${t}` } : {}; },
        base: () => `https://api.github.com/repos/${API.owner()}/${API.repo()}/contents`,
        raw: (file) => `https://raw.githubusercontent.com/${API.owner()}/${API.repo()}/main/${file}?t=${Date.now()}`
      };

      let currentTab = 'levels';
      let data = { levels: [], entities: [], items: [], foods: [] };

      // ── Load data ──────────────────────────────
      async function fetchFilesInFolder(folder) {
        if (!API.owner() || !API.repo()) return [];
        const url = `${API.base()}/${folder}`;
        try {
          const resp = await fetch(url, { headers: API.headers(), cache: 'no-store' });
          if (!resp.ok) return [];
          const items = await resp.json();
          return Array.isArray(items) ? items.filter(f => f.type === 'file' && f.name.endsWith('.json')) : [];
        } catch (e) { return []; }
      }

      async function loadAllData() {
        const folders = ['levels', 'entities', 'items', 'foods'];
        data = { levels: [], entities: [], items: [], foods: [] };
        const downloadPromises = [];
        for (const folder of folders) {
          const files = await fetchFilesInFolder(folder);
          files.forEach(file => {
            downloadPromises.push((async () => {
              try {
                const resp = await fetch(file.download_url, { cache: 'no-store' });
                if (resp.ok) {
                  const obj = await resp.json();
                  obj._sha = file.sha;
                  data[folder].push(obj);
                }
              } catch (e) { }
            })());
          });
        }
        await Promise.all(downloadPromises);
      }

      // ── Render ────────────────────────────────
      function getClassIcon(cls) {
        const icons = { '0': '🟢', '1': '🟡', '2': '🟠', '3': '🟤', '4': '🔴', '5': '⛔' };
        return icons[cls] || '⬜';
      }

      function sortLevels(arr, key) {
        const a = [...arr];
        switch (key) {
          case 'id_asc': return a.sort((x, y) => (x.id || '').localeCompare(y.id || '', undefined, { numeric: true }));
          case 'id_desc': return a.sort((x, y) => (y.id || '').localeCompare(x.id || '', undefined, { numeric: true }));
          case 'name_asc': return a.sort((x, y) => (x.title || '').localeCompare(y.title || ''));
          case 'name_desc': return a.sort((x, y) => (y.title || '').localeCompare(x.title || ''));
          case 'class_asc': return a.sort((x, y) => parseInt(x.cls || 0) - parseInt(y.cls || 0));
          case 'class_desc': return a.sort((x, y) => parseInt(y.cls || 0) - parseInt(x.cls || 0));
          default: return a;
        }
      }

      function renderCatalog() {
        const container = document.getElementById('contentArea');
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const clusterFilter = document.getElementById('clusterFilter').value;
        const sortKey = document.getElementById('sortSelect').value;

        let items = data.levels;
        if (search) items = items.filter(l => (l.title || '').toLowerCase().includes(search) || (l.id || '').includes(search));
        if (clusterFilter) items = items.filter(l => (l.cluster || 'Без кластера') === clusterFilter);
        items = sortLevels(items, sortKey);

        if (!items.length) {
          container.innerHTML = '<div class="empty-state">Ничего не найдено. Попробуйте изменить запрос.</div>';
          return;
        }

        // Group by cluster
        const clusters = {};
        items.forEach(l => {
          const c = l.cluster || 'Без кластера';
          if (!clusters[c]) clusters[c] = [];
          clusters[c].push(l);
        });

        container.innerHTML = Object.entries(clusters).map(([name, levels]) => `
          <div class="cluster">
            <div class="cluster-title">
              📁 ${name}
              <span class="cluster-count">${levels.length} уровней</span>
            </div>
            <div class="level-grid">
              ${levels.map(l => `
                <div class="level-card" data-id="${l.id}">
                  <div class="level-icon">${getClassIcon(l.cls)}</div>
                  <div class="level-info">
                    <div class="level-id">${l.id}</div>
                    <div class="level-name">${l.title || 'Без названия'}</div>
                  </div>
                  <div class="level-class-badge">Класс ${l.cls || '?'}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');

        // Click → quick view
        document.querySelectorAll('.level-card').forEach(card => {
          card.addEventListener('click', () => {
            const id = card.dataset.id;
            const level = data.levels.find(l => l.id === id);
            if (level) showQuickView(level);
          });
        });
      }

      function showQuickView(level) {
        const modal = document.getElementById('quickViewModal');
        const content = document.getElementById('quickViewContent');
        content.innerHTML = `
          <h3>Уровень ${level.id} – «${level.title || 'Без названия'}»</h3>
          <p><strong>Класс:</strong> ${level.cls || '?'} ${getClassIcon(level.cls)}</p>
          <p><strong>Кластер:</strong> ${level.cluster || '—'}</p>
          <p>${(level.desc || '').substring(0, 300)}…</p>
          <div class="modal-actions">
            <button class="nav-link" id="closeQuickView">Закрыть</button>
            <button class="nav-link primary" id="openFullView">Открыть полностью</button>
          </div>
        `;
        modal.classList.add('active');
        document.getElementById('closeQuickView').addEventListener('click', () => modal.classList.remove('active'));
        document.getElementById('openFullView').addEventListener('click', () => {
          modal.classList.remove('active');
          // Открыть в текущем окне (заглушка – можно реализовать полноценный просмотр)
          alert('Полноценный просмотр уровня будет добавлен в следующем обновлении.');
        });
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
      }

      function updateClusterFilter() {
        const clusters = [...new Set(data.levels.map(l => l.cluster || 'Без кластера'))].sort();
        const select = document.getElementById('clusterFilter');
        select.innerHTML = '<option value="">Все кластеры</option>' + clusters.map(c => `<option value="${c}">${c}</option>`).join('');
      }

      // ── Event listeners ────────────────────────
      document.getElementById('searchInput').addEventListener('input', renderCatalog);
      document.getElementById('clusterFilter').addEventListener('change', renderCatalog);
      document.getElementById('sortSelect').addEventListener('change', renderCatalog);

      document.querySelectorAll('.nav-link[data-tab]').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.nav-link[data-tab]').forEach(l => l.classList.remove('active'));
          link.classList.add('active');
          currentTab = link.dataset.tab;
          // Для других вкладок можно также отобразить соответствующий каталог
          renderCatalog();
        });
      });

      document.getElementById('addBtn').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Редактор уровней откроется в следующем обновлении.');
      });

      // ── Init ────────────────────────────────────
      (async () => {
        await loadAllData();
        updateClusterFilter();
        renderCatalog();
      })();
    })();
  </script>
</body>
</html>
